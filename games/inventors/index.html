<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Famous Inventors - Scientists and Their Discoveries for Kids | Doodles Games</title>
    <meta name="title" content="Famous Inventors - Science History Quiz for Kids" />
    <meta
      name="description"
      content="Meet the brilliant minds who changed the world! Learn about Edison, Bell, Einstein, Darwin, and more."
    />
    <meta
      name="keywords"
      content="famous inventors, scientists, Edison, Einstein, Bell, Darwin, Tesla, inventions for kids"
    />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/inventors/" />
    <meta property="og:title" content="Famous Inventors - Science History Quiz for Kids" />
    <meta
      property="og:description"
      content="Meet the brilliant minds who changed the world! Edison, Einstein, Bell and more."
    />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/inventors/" />
    <meta property="twitter:title" content="Famous Inventors - Science History Quiz for Kids" />
    <meta
      property="twitter:description"
      content="Meet the brilliant minds who changed the world! Edison, Einstein, Bell and more."
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/inventors/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0a1200;
        --dom-accent: #65a30d;
        --dom-accent2: #ca8a04;
        --dom-text: rgba(255, 255, 255, 0.95);
        --dom-text-muted: rgba(255, 255, 255, 0.62);
        --dom-bg: #080f00;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .inv-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .inv-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#inventors"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Famous Inventors</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji"><i class="ti ti-bulb"></i></div>
        <h1 class="start-title">Famous Inventors</h1>
        <p class="start-desc">
          Brilliant minds who changed history! Match inventors to their amazing discoveries and inventions.
        </p>
        <div class="inv-chips">
          <span class="inv-chip">💡 Edison</span>
          <span class="inv-chip">📞 Bell</span>
          <span class="inv-chip">⚛️ Einstein</span>
          <span class="inv-chip">✈️ Wright Bros</span>
          <span class="inv-chip">⚡ Tesla</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">💡</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Genius Award!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
