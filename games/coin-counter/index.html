    />

    <title>Coin Counter - Count Money for Kids | Doodles Games</title>
    <meta name="title" content="Coin Counter - How Much Money Is This?" />

      name="description"
      content="Count pennies, nickels, dimes, and quarters! Add up the coins and choose the right total. Perfect for learning US money and coin values."
    />
    <meta

      content="coin counter, counting money, pennies nickels dimes quarters, math, kids, educational"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="game" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/coin-counter/" />
    <meta property="twitter:title" content="Coin Counter - How Much Money Is This?" />
    <meta property="twitter:description" content="Count pennies, nickels, dimes, and quarters to find the total!" />

    <link rel="canonical" href="https://abhee15.github.io/doodles/games/coin-counter/" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />

    <!-- Design System -->
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #14532d;
        --dom-accent: #16a34a;
        --dom-accent2: #15803d;
        --dom-bg: #f0fdf4;
        --dom-border: rgba(22, 163, 74, 0.2);
        --dom-text: #14532d;
        --dom-text-muted: #6b7280;
        --correct: #10b981;
        --wrong: #ef4444;
      }

      /* ═══ COIN DISPLAY ═══ */
      .coin-display-wrap {
        padding: 24px 20px 0;
        max-width: 520px;
        margin: 0 auto;
      }

      .coin-display {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        min-height: 100px;
        align-items: center;
      }

      .coin-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .coin-circle {
        width: 68px;
        height: 68px;
        border-radius: 50%;
        border: 4px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }

      .coin-label {
        font-size: 1rem;
        font-weight: 900;
        color: rgba(0, 0, 0, 0.6);
        line-height: 1;
      }

      .coin-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--dom-text-muted);
      }

      /* ═══ QUESTION AREA ═══ */
      .q-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px 0;
        max-width: 520px;
        margin: 0 auto;
      }

      .q-progress {
        font-size: 0.875rem;
        color: var(--dom-text-muted);
        font-weight: 600;
      }

      .q-score-badge {
        background: var(--dom-accent2);
        color: white;
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.875rem;
        font-weight: 700;
      }

      .progress-track {
        height: 6px;
        background: var(--dom-border);
        border-radius: 3px;
        margin: 10px 20px 0;
        max-width: calc(520px - 40px);
        margin-left: auto;
        margin-right: auto;
        overflow: hidden;
      }

      .progress-track-fill {
        height: 100%;
        background: var(--dom-accent);
        border-radius: 3px;
        transition: width 0.3s;
      }

      .q-question {
        text-align: center;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--dom-text);
        padding: 16px 20px 0;
      }

      .q-feedback {
        font-size: 1rem;
        font-weight: 700;
        text-align: center;
        padding: 10px 20px 0;
        min-height: 28px;
        color: var(--dom-text-muted);
      }

      .q-feedback.correct {
        color: var(--correct);
      }
      .q-feedback.wrong {
        color: var(--wrong);
      }

      /* ═══ CHOICES ═══ */
      .choices-area {
        padding: 16px 20px 0;
        max-width: 420px;
        margin: 0 auto;
      }

      .choices-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .choice-btn {
        background: white;
        border: 2.5px solid var(--dom-border);
        border-radius: 14px;
        padding: 20px 12px;
        font-size: 1.3rem;
        font-weight: 800;
        color: var(--dom-text);
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        text-align: center;
      }

      .choice-btn:hover:not(:disabled) {
        border-color: var(--dom-accent);
        background: #f0fdf4;
        transform: translateY(-2px);
      }

      .choice-btn.correct {
        border-color: var(--correct) !important;
        background: #d1fae5 !important;
        color: var(--correct) !important;
      }

      .choice-btn.wrong {
        border-color: var(--wrong) !important;
        background: #fee2e2 !important;
        color: var(--wrong) !important;
      }

      .choice-btn:disabled {
        cursor: default;
        transform: none;
      }

      /* ═══ COIN REFERENCE ═══ */
      .coin-ref {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        padding: 14px 20px 0;
        max-width: 520px;
        margin: 0 auto;
      }

      .coin-ref-item {
        display: flex;
        align-items: center;
        gap: 6px;
        background: white;
        border: 1.5px solid var(--dom-border);
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--dom-text);
      }

      .coin-ref-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid;
        flex-shrink: 0;
      }

      /* ═══ RESULTS ═══ */
      .results-card {
        background: white;
        border: 2px solid var(--dom-border);
        border-radius: 20px;
        margin: 24px 20px;
        padding: 32px 24px;
        text-align: center;
        max-width: 480px;
        margin-left: auto;
        margin-right: auto;
      }

      .result-trophy {
        font-size: 4rem;
        margin-bottom: 8px;
      }

      .result-score-big {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--dom-accent);
      }

      .result-fraction {
        font-size: 1rem;
        color: var(--dom-text-muted);
        margin: 4px 0 16px;
      }

      .result-message {
        font-size: 1rem;
        color: var(--dom-text);
        line-height: 1.5;
        margin-bottom: 24px;
      }

      .result-btns {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      @media (max-width: 768px) {
        .coin-circle {
          width: 56px;
          height: 56px;
        }
        .coin-label {
          font-size: 0.875rem;
        }
        .choice-btn {
          font-size: 1.1rem;
          padding: 16px 10px;
        }
        .coin-ref {
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#coin-counter"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title">Coin Counter</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <!-- Landing Screen -->
    <div class="dom-screen active" data-screen="landing" id="screen-landing">
      <div style="padding: 36px 24px; max-width: 460px; margin: 0 auto; text-align: center">
        <div style="font-size: 64px; margin-bottom: 14px">🪙</div>
        <h1 style="color: var(--dom-accent); margin: 0 0 10px 0; font-size: 1.8rem">Coin Counter</h1>
        <p style="color: var(--dom-text-muted); margin: 0 0 24px 0; font-size: 1rem; line-height: 1.6">
          Count up the coins and tap the right total! Start with a few coins and work up to trickier combinations.
        </p>

        <!-- Coin reference card -->
        <div
          style="
            background: white;
            border: 2px solid var(--dom-border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
            text-align: left;
          "
        >
          <div style="font-size: 0.875rem; font-weight: 700; color: var(--dom-text); margin-bottom: 12px">
            Coin Values
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px">
            <div style="display: flex; align-items: center; gap: 8px">
              <div
                style="
                  width: 32px;
                  height: 32px;
                  border-radius: 50%;
                  background: #b87333;
                  border: 3px solid #8b5a2b;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  flex-shrink: 0;
                "
              >
                <span style="font-size: 0.875rem; font-weight: 900; color: rgba(0, 0, 0, 0.5)">1¢</span>
              </div>
              <span style="font-size: 0.875rem; color: var(--dom-text)"><strong>Penny</strong> = 1¢</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px">
              <div
                style="
                  width: 32px;
                  height: 32px;
                  border-radius: 50%;
                  background: #c0c0c0;
                  border: 3px solid #888;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  flex-shrink: 0;
                "
              >
                <span style="font-size: 0.875rem; font-weight: 900; color: rgba(0, 0, 0, 0.5)">5¢</span>
              </div>
              <span style="font-size: 0.875rem; color: var(--dom-text)"><strong>Nickel</strong> = 5¢</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px">
              <div
                style="
                  width: 32px;
                  height: 32px;
                  border-radius: 50%;
                  background: #b8bec7;
                  border: 3px solid #777;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  flex-shrink: 0;
                "
              >
                <span style="font-size: 0.875rem; font-weight: 900; color: rgba(0, 0, 0, 0.5)">10¢</span>
              </div>
              <span style="font-size: 0.875rem; color: var(--dom-text)"><strong>Dime</strong> = 10¢</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px">
              <div
                style="
                  width: 32px;
                  height: 32px;
                  border-radius: 50%;
                  background: #d4af37;
                  border: 3px solid #b8860b;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  flex-shrink: 0;
                "
              >
                <span style="font-size: 0.875rem; font-weight: 900; color: rgba(0, 0, 0, 0.5)">25¢</span>
              </div>
              <span style="font-size: 0.875rem; color: var(--dom-text)"><strong>Quarter</strong> = 25¢</span>
            </div>
          </div>
        </div>

        <button class="dom-btn dom-btn--primary" style="width: 100%; font-size: 1rem; padding: 14px" id="btn-start">
          Start Counting →
        </button>
      </div>
    </div>

    <!-- Game Screen -->
    <div class="dom-screen" data-screen="game" id="screen-game">
      <div class="q-header">
        <span class="q-progress" id="q-progress">Round 1 of 10</span>
        <span class="q-score-badge" id="q-score">Score: 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-track-fill" id="progress-fill" style="width: 0%"></div>
      </div>

      <div class="q-question">How much money is this?</div>

      <div class="coin-display-wrap">
        <div class="coin-display" id="coin-display"></div>
      </div>

      <div class="q-feedback" id="q-feedback"></div>

      <div class="choices-area">
        <div class="choices-grid" id="choices-grid"></div>
      </div>
    </div>

    <!-- Results Screen -->
    <div class="dom-screen" data-screen="results" id="screen-results">
      <div class="results-card">
        <div class="result-trophy" id="result-trophy">🏆</div>
        <div class="result-score-big" id="result-score">0</div>
        <div class="result-fraction">out of <span id="result-max">10</span> · <span id="result-pct">0%</span></div>
        <div class="result-message" id="result-message">Great job!</div>
        <div class="result-btns">
          <button class="dom-btn dom-btn--secondary" id="btn-back">Back to Start</button>
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again →</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
