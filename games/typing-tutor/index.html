    <style>
      :root {
        --dom-nav-bg: #1e3a5f;
        --dom-accent: #00b4d8;
        --dom-accent-dark: #0096b7;
        --dom-accent2: #0077b6;
        --dom-bg: #0a1628;
        --dom-bg-card: rgba(255, 255, 255, 0.06);
        --dom-border: rgba(255, 255, 255, 0.12);
        --dom-text: #f0f0f0;
        --dom-text-muted: rgba(255, 255, 255, 0.55);
      }

      .mode-cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      .mode-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      .mode-card:hover {
        transform: translateY(-2px);
        border-color: var(--dom-accent);
      }
      .mode-card .icon {
        font-size: 36px;
        margin-bottom: 6px;
      }
      .mode-card h3 {
        color: var(--dom-text);
        font-size: 1.1rem;
        margin: 0 0 4px;
      }
      .mode-card p {
        color: var(--dom-text-muted);
        font-size: 0.82rem;
        margin: 0;
      }

      .mobile-notice {
        background: rgba(0, 180, 216, 0.1);
        border: 1px solid var(--dom-accent);
        border-radius: 12px;
        padding: 16px;
        margin: 16px 20px;
        text-align: center;
        color: var(--dom-text);
        font-size: 0.9rem;
      }

      .lesson-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 16px 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      .lesson-item {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        padding: 14px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition:
          border-color 0.15s,
          transform 0.1s;
      }
      .lesson-item:hover {
        border-color: var(--dom-accent);
        transform: translateY(-1px);
      }
      .lesson-num {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--dom-accent2);
        color: #fff;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .lesson-item.completed .lesson-num {
        background: #10b981;
      }
      .lesson-info h4 {
        color: var(--dom-text);
        margin: 0;
        font-size: 0.95rem;
      }
      .lesson-info p {
        color: var(--dom-text-muted);
        margin: 2px 0 0;
        font-size: 0.78rem;
      }

      .typing-area {
        padding: 16px 20px;
        max-width: 700px;
        margin: 0 auto;
      }
      .text-display {
        font-family: 'Courier New', Courier, monospace;
        font-size: 1.3rem;
        line-height: 2;
        padding: 16px;
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        min-height: 60px;
        color: var(--dom-text-muted);
      }
      .text-display .typed {
        color: #10b981;
      }
      .text-display .current {
        background: var(--dom-accent);
        color: #000;
        padding: 0 1px;
        border-radius: 2px;
      }
      .text-display .error {
        background: #ef4444;
        color: #fff;
        padding: 0 1px;
        border-radius: 2px;
      }

      .stats-bar {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 12px;
        color: var(--dom-text-muted);
        font-size: 0.85rem;
      }
      .stats-bar .val {
        color: var(--dom-accent);
        font-weight: 700;
      }

      .keyboard {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 12px 8px;
      }
      .kb-row {
        display: flex;
        gap: 4px;
      }
      .kb-key {
        min-width: 36px;
        height: 38px;
        border-radius: 6px;
        border: 1px solid var(--dom-border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--dom-text-muted);
        transition:
          transform 0.1s,
          border-color 0.1s;
      }
      .kb-key.highlight {
        transform: scale(1.15);
        border-color: var(--dom-accent);
        color: #fff;
        z-index: 1;
      }
      .kb-key.pressed {
        transform: scale(0.9);
      }
      .kb-key.space {
        min-width: 200px;
      }
      .kb-key.finger-lp {
        background: rgba(239, 68, 68, 0.12);
      }
      .kb-key.finger-lr {
        background: rgba(249, 115, 22, 0.12);
      }
      .kb-key.finger-lm {
        background: rgba(234, 179, 8, 0.12);
      }
      .kb-key.finger-li {
        background: rgba(34, 197, 94, 0.12);
      }
      .kb-key.finger-ri {
        background: rgba(6, 182, 212, 0.12);
      }
      .kb-key.finger-rm {
        background: rgba(59, 130, 246, 0.12);
      }
      .kb-key.finger-rr {
        background: rgba(139, 92, 246, 0.12);
      }
      .kb-key.finger-rp {
        background: rgba(236, 72, 153, 0.12);
      }
      .kb-key.finger-thumb {
        background: rgba(156, 163, 175, 0.1);
      }

      .falling-area {
        position: relative;
        width: 100%;
        height: 350px;
        overflow: hidden;
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        margin: 8px 0;
      }
      .falling-word {
        position: absolute;
        font-family: 'Courier New', monospace;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--dom-text);
        padding: 4px 10px;
        border: 1px solid var(--dom-border);
        border-radius: 8px;
        background: var(--dom-bg);
        transition: border-color 0.15s;
        white-space: nowrap;
      }
      .falling-word.active {
        border-color: var(--dom-accent);
        color: var(--dom-accent);
      }
      .falling-word .typed-part {
        color: #10b981;
      }

      .type-input {
        font-family: 'Courier New', monospace;
        font-size: 1.2rem;
        text-align: center;
        padding: 10px;
        background: var(--dom-bg-card);
        border: 2px solid var(--dom-border);
        border-radius: 10px;
        color: #fff;
        width: 100%;
        max-width: 300px;
        margin: 8px auto;
        display: block;
      }
      .type-input:focus {
        border-color: var(--dom-accent);
        outline: none;
      }

      .lives {
        text-align: center;
        font-size: 1.4rem;
        padding: 4px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      .stat-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat-card .value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--dom-accent);
      }
      .stat-card .label {
        font-size: 0.8rem;
        color: var(--dom-text-muted);
        margin-top: 4px;
      }

      .stars {
        text-align: center;
        font-size: 2.5rem;
        margin: 12px 0;
      }
      .section-title {
        text-align: center;
        font-size: 1.1rem;
        color: var(--dom-text-muted);
        padding: 12px 16px 4px;
      }
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        flex-wrap: wrap;
      }

      @media (min-width: 500px) {
        .mode-cards {
          grid-template-columns: repeat(3, 1fr);
        }
        .kb-key {
          min-width: 44px;
          height: 44px;
          font-size: 0.9rem;
        }
        .kb-key.space {
          min-width: 280px;
        }
      }
    </style>
