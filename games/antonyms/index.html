<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Antonyms - Opposites Word Game for Kids | Doodles Games</title>
    <meta name="title" content="Antonyms - Find the Opposite Word for Kids" />
    <meta
      name="description"
      content="Find the opposite word! Practice antonyms like happy/sad, hot/cold, fast/slow and build your vocabulary."
    />
    <meta name="keywords" content="antonyms, opposites, vocabulary, word game, english, kids learning" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/antonyms/" />
    <meta property="og:title" content="Antonyms - Find the Opposite Word for Kids" />
    <meta property="og:description" content="Find the opposite word! Practice antonyms and build vocabulary." />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/antonyms/" />
    <meta property="twitter:title" content="Antonyms - Find the Opposite Word for Kids" />
    <meta property="twitter:description" content="Find the opposite word! Practice antonyms and build vocabulary." />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/antonyms/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0e0018;
        --dom-accent: #a855f7;
        --dom-accent2: #f43f5e;
        --dom-bg: #120020;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .ant-demo {
        font-size: 1.5rem;
        text-align: center;
        margin: 10px 0;
      }
      .ant-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 14px 0;
      }
      .ant-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#antonyms"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Antonyms</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🔤</div>
        <h1 class="start-title">Antonyms</h1>
        <p class="start-desc">
          Find the opposite! Antonyms are words with completely opposite meanings. Build your vocabulary!
        </p>
        <div class="ant-demo">😊 Happy ↔ Sad 😢</div>
        <div class="ant-chips">
          <span class="ant-chip">🌡️ Hot / Cold</span>
          <span class="ant-chip">🐢 Fast / Slow</span>
          <span class="ant-chip">🌙 Day / Night</span>
          <span class="ant-chip">💪 Strong / Weak</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">🔤</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Word Master!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
