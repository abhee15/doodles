    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #140022;
        --dom-accent: #a855f7;
        --dom-accent2: #d8b4fe;
        --dom-text: rgba(255, 255, 255, 0.95);
        --dom-text-muted: rgba(255, 255, 255, 0.62);
        --dom-bg: #0d0018;
        --dom-border: rgba(168, 85, 247, 0.22);
      }
      .word-builder {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        margin: 6px 0;
        flex-wrap: wrap;
      }
      .wb-part {
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 800;
        border: 2px solid;
      }
      .wb-prefix {
        background: rgba(168, 85, 247, 0.18);
        border-color: #a855f7;
        color: #d8b4fe;
      }
      .wb-root {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        color: white;
      }
      .wb-suffix {
        background: rgba(34, 211, 153, 0.15);
        border-color: #34d399;
        color: #6ee7b7;
      }
      .wb-plus {
        color: rgba(255, 255, 255, 0.4);
        font-size: 1rem;
        font-weight: 700;
      }
      .wb-eq {
        color: rgba(255, 255, 255, 0.4);
        font-size: 1rem;
        font-weight: 700;
      }
      .wb-result {
        background: rgba(250, 204, 21, 0.1);
        border-color: #fbbf24;
        color: #fde68a;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#prefixes-suffixes"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Prefixes &amp; Suffixes</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji"><i class="ti ti-abc"></i></div>
        <h1 class="start-title">Prefixes &amp; Suffixes</h1>
        <p class="start-desc">
          Unlock thousands of words! Prefixes go at the START (un-, re-, pre-) and suffixes go at the END (-ful, -less,
          -er). Combine them to build new meanings!
        </p>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>

        <!-- Word builder visual -->
        <div class="word-builder" id="word-builder" aria-hidden="true">
          <span class="wb-part wb-prefix" id="wb-prefix" style="display: none"></span>
          <span class="wb-plus" id="wb-plus1" style="display: none">+</span>
          <span class="wb-part wb-root" id="wb-root"></span>
          <span class="wb-plus" id="wb-plus2" style="display: none">+</span>
          <span class="wb-part wb-suffix" id="wb-suffix" style="display: none"></span>
          <span class="wb-eq" id="wb-eq" style="display: none">=</span>
          <span class="wb-part wb-result" id="wb-result" style="display: none"></span>
        </div>

        <div class="q-emoji" id="q-emoji">🔤</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Word Builder!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
