    <style>
      :root {
        --dom-nav-bg: #1a1a2e;
        --dom-accent: #e94560;
        --dom-accent-dark: #c13550;
        --dom-accent2: #0f3460;
        --dom-bg: #16213e;
        --dom-bg-card: rgba(255, 255, 255, 0.06);
        --dom-border: rgba(255, 255, 255, 0.12);
        --dom-text: #f0f0f0;
        --dom-text-muted: rgba(255, 255, 255, 0.55);
      }

      .mode-cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      .mode-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      .mode-card:hover,
      .mode-card:active {
        transform: translateY(-2px);
        border-color: var(--dom-accent);
      }
      .mode-card .icon {
        font-size: 40px;
        margin-bottom: 8px;
      }
      .mode-card h3 {
        color: var(--dom-text);
        font-size: 1.2rem;
        margin: 0 0 6px;
      }
      .mode-card p {
        color: var(--dom-text-muted);
        font-size: 0.85rem;
        margin: 0;
      }

      .table-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        padding: 16px;
        max-width: 500px;
        margin: 0 auto;
      }
      .table-btn {
        background: var(--dom-accent2);
        color: #fff;
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 16px 8px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s,
          border-color 0.15s;
        min-height: 48px;
        text-align: center;
      }
      .table-btn:hover,
      .table-btn:active {
        transform: translateY(-1px);
        border-color: var(--dom-accent);
      }
      .table-btn.mastered {
        border-color: #10b981;
      }

      .dot-grid {
        display: inline-grid;
        gap: 6px;
        padding: 20px;
        justify-content: center;
      }
      .dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--dom-accent);
        transition:
          transform 0.2s,
          opacity 0.3s;
      }
      .dot.animate {
        animation: dotPop 0.3s ease-out;
      }
      @keyframes dotPop {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .equation {
        font-size: 2rem;
        font-weight: 800;
        color: #fff;
        text-align: center;
        margin: 16px 0;
      }
      .equation .result {
        color: var(--dom-accent);
      }

      .learn-nav {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 16px;
      }

      .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        max-width: 280px;
        margin: 12px auto;
        padding: 0 16px;
      }
      .numpad-btn {
        background: var(--dom-accent2);
        color: #fff;
        border: 2px solid transparent;
        border-radius: 12px;
        font-size: 1.4rem;
        font-weight: 700;
        min-height: 56px;
        cursor: pointer;
        transition:
          transform 0.1s,
          border-color 0.15s;
      }
      .numpad-btn:hover {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .numpad-btn:active {
        transform: scale(0.95);
      }
      .numpad-btn.clear {
        background: #374151;
        font-size: 1rem;
      }
      .numpad-btn.submit {
        background: #10b981;
        font-size: 1rem;
      }

      .answer-display {
        font-size: 2.5rem;
        font-weight: 800;
        color: #fff;
        text-align: center;
        min-height: 60px;
        line-height: 60px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid var(--dom-border);
        border-radius: 12px;
        margin: 8px 20px;
        letter-spacing: 8px;
      }
      .answer-display.correct {
        border-color: #10b981;
        color: #10b981;
      }
      .answer-display.wrong {
        border-color: #ef4444;
        color: #ef4444;
      }

      .question-text {
        font-size: 1.8rem;
        font-weight: 800;
        color: #fff;
        text-align: center;
        margin: 12px 0;
      }

      .feedback {
        text-align: center;
        font-size: 1rem;
        font-weight: 600;
        min-height: 28px;
        margin: 4px 0;
      }
      .feedback.correct {
        color: #10b981;
      }
      .feedback.wrong {
        color: #ef4444;
      }

      .progress-row {
        display: flex;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        flex-wrap: wrap;
      }
      .progress-dot {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid var(--dom-border);
        background: transparent;
        font-size: 10px;
        line-height: 20px;
        text-align: center;
        color: var(--dom-text-muted);
      }
      .progress-dot.correct {
        background: #10b981;
        border-color: #10b981;
        color: #fff;
      }
      .progress-dot.wrong {
        background: #ef4444;
        border-color: #ef4444;
        color: #fff;
      }
      .progress-dot.current {
        border-color: var(--dom-accent);
      }

      .streak-bar {
        text-align: center;
        font-size: 0.9rem;
        color: var(--dom-accent);
        font-weight: 700;
        padding: 4px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      .stat-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat-card .value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--dom-accent);
      }
      .stat-card .label {
        font-size: 0.8rem;
        color: var(--dom-text-muted);
        margin-top: 4px;
      }

      .stars {
        text-align: center;
        font-size: 2.5rem;
        margin: 12px 0;
      }

      .timer-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin: 8px 20px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: #10b981;
        border-radius: 3px;
        transition: width 0.1s linear;
      }
      .timer-fill.warning {
        background: #f59e0b;
      }
      .timer-fill.danger {
        background: #ef4444;
      }

      .lives {
        text-align: center;
        font-size: 1.5rem;
        padding: 4px;
      }

      .section-title {
        text-align: center;
        font-size: 1.1rem;
        color: var(--dom-text-muted);
        padding: 16px 16px 4px;
      }

      .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 12px 16px;
        flex-wrap: wrap;
      }

      @media (min-width: 500px) {
        .mode-cards {
          grid-template-columns: repeat(3, 1fr);
        }
        .table-grid {
          grid-template-columns: repeat(6, 1fr);
        }
      }
    </style>
