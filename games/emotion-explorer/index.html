<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="title" content="Emotion Explorer - Understand Your Feelings" />
    <meta
      name="description"
      content="Explore different emotions, learn what triggers them, recognize physical signals, and discover coping strategies for kids."
    />
    <meta name="keywords" content="emotions, feelings, social-emotional learning, coping strategies, mindfulness" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/emotion-explorer/" />
    <meta property="og:title" content="Emotion Explorer - Understand Your Feelings" />
    <meta
      property="og:description"
      content="Explore different emotions, learn what triggers them, recognize physical signals, and discover coping strategies for kids."
    />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/emotion-explorer/" />
    <meta property="twitter:title" content="Emotion Explorer - Understand Your Feelings" />
    <meta
      property="twitter:description"
      content="Explore different emotions, learn what triggers them, recognize physical signals, and discover coping strategies for kids."
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/emotion-explorer/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #7c3aed;
        --dom-accent: #ec4899;
        --dom-accent2: #f59e0b;
        --dom-bg: #fef3c7;
        --dom-border: rgba(124, 58, 237, 0.2);
      }

      .emotion-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        border-radius: 12px;
        border: 2px solid var(--dom-border);
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        gap: 10px;
      }

      .emotion-card:hover {
        transform: translateY(-4px);
        border-color: var(--dom-accent);
        border-width: 2px;
      }

      .emotion-emoji {
        font-size: 48px;
      }

      .emotion-name {
        font-weight: 600;
        color: #1f2937;
        font-size: 16px;
      }

      .emotions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        padding: 20px;
      }

      .emotion-detail {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .detail-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .detail-section h3 {
        font-size: 16px;
        font-weight: 600;
        color: var(--dom-accent);
        margin: 0;
      }

      .detail-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .detail-item {
        background: white;
        padding: 10px 12px;
        border-radius: 8px;
        border-left: 4px solid var(--dom-accent);
        font-size: 14px;
        color: #374151;
      }

      .intensity-slider {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .intensity-slider input[type='range'] {
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: linear-gradient(to right, #10b981, #f59e0b, #ef4444);
        outline: none;
        -webkit-appearance: none;
      }

      .intensity-slider input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--dom-accent);
        cursor: pointer;
        border: 2px solid white;
      }

      .intensity-slider input[type='range']::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--dom-accent);
        cursor: pointer;
        border: 2px solid white;
      }

      .intensity-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #6b7280;
      }

      .intensity-value {
        font-weight: 600;
        color: var(--dom-accent);
        font-size: 18px;
        text-align: center;
      }

      .breathing-section {
        background: white;
        border-radius: 8px;
        border: 2px solid var(--dom-accent2);
        padding: 15px;
        text-align: center;
      }

      .breathing-circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--dom-accent2), var(--dom-accent));
        margin: 15px auto;
        animation: breathe 4s infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
      }

      .breathing-text {
        font-size: 14px;
        color: #374151;
        margin-top: 10px;
      }

      .quiz-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .quiz-scenario {
        background: white;
        padding: 15px;
        border-radius: 8px;
        border: 2px solid var(--dom-border);
      }

      .quiz-scenario h3 {
        margin: 0 0 10px 0;
        font-size: 15px;
        font-weight: 600;
        color: #1f2937;
      }

      .quiz-scenario p {
        margin: 0 0 15px 0;
        font-size: 14px;
        color: #374151;
        line-height: 1.5;
      }

      .quiz-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .quiz-option {
        background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
        border: 2px solid var(--dom-border);
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }

      .quiz-option:hover {
        border-color: var(--dom-accent);
        background: linear-gradient(135deg, var(--dom-accent2), var(--dom-accent));
        color: white;
      }

      .quiz-option.selected {
        border-color: var(--dom-accent);
        background: linear-gradient(135deg, var(--dom-accent2), var(--dom-accent));
        color: white;
      }

      .explanation {
        background: #d1fae5;
        border-left: 4px solid #10b981;
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        color: #065f46;
        margin-top: 10px;
      }

      .back-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      @media (max-width: 768px) {
        .emotions-grid {
          grid-template-columns: repeat(2, 1fr);
          padding: 15px;
          gap: 10px;
        }

        .emotion-emoji {
          font-size: 36px;
        }

        .emotion-name {
          font-size: 14px;
        }

        .detail-section h3 {
          font-size: 14px;
        }

        .detail-item {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#emotion-explorer"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Emotion Explorer</span>
      <span class="dom-nav-meta"></span>
    </nav>

    <!-- Home Screen -->
    <div class="dom-screen active" data-screen="home" id="home-screen">
      <div style="padding: 20px; text-align: center">
        <h1 style="color: #1f2937; margin: 0 0 10px 0">Explore Your Emotions</h1>
        <p style="color: #6b7280; margin: 0 0 20px 0; font-size: 14px">Click on any emotion to learn more!</p>
      </div>
      <div class="emotions-grid" id="emotions-grid"></div>
    </div>

    <!-- Detail Screen -->
    <div class="dom-screen" data-screen="detail" id="detail-screen">
      <div style="padding: 20px">
        <button class="back-btn" id="back-to-home">← Back</button>

        <div style="display: flex; align-items: center; gap: 15px; margin: 20px 0">
          <div style="font-size: 48px" id="detail-emoji"></div>
          <h2 id="detail-emotion-name" style="margin: 0; color: #1f2937"></h2>
        </div>

        <div class="emotion-detail">
          <div class="detail-section">
            <h3>What triggers this emotion?</h3>
            <div class="detail-list" id="triggers-list"></div>
          </div>

          <div class="detail-section">
            <h3>Physical signals</h3>
            <div class="detail-list" id="signals-list"></div>
          </div>

          <div class="detail-section">
            <h3>Coping strategies</h3>
            <div class="detail-list" id="strategies-list"></div>
          </div>

          <div class="detail-section">
            <h3>How intense is this emotion?</h3>
            <div class="intensity-slider">
              <input type="range" min="1" max="10" value="5" id="intensity-slider" />
              <div class="intensity-value" id="intensity-value">5 / 10</div>
              <div class="intensity-label">
                <span>Mild</span>
                <span>Intense</span>
              </div>
            </div>
          </div>

          <div id="breathing-container"></div>
        </div>

        <div style="text-align: center; margin-top: 30px; padding-bottom: 20px">
          <button class="dom-btn dom-btn--primary" id="take-quiz-btn" style="width: 100%; max-width: 200px">
            Take a Quiz
          </button>
        </div>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div class="dom-screen" data-screen="quiz" id="quiz-screen">
      <div style="padding: 20px">
        <button class="back-btn" id="back-to-detail">← Back</button>

        <h2 style="color: #1f2937; margin: 20px 0 10px 0">Emotion Quiz</h2>
        <p style="color: #6b7280; font-size: 14px; margin: 0 0 20px 0">
          Read the scenario and choose which emotion it represents.
        </p>

        <div class="quiz-container" id="quiz-container"></div>

        <div style="text-align: center; margin-top: 20px; padding-bottom: 20px">
          <button class="dom-btn dom-btn--primary" id="restart-quiz-btn">Restart Quiz</button>
        </div>
      </div>
    </div>

    <script src="emotions-data.js"></script>
    <script src="game.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
