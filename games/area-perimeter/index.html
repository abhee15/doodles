    <style>
      :root {
        --dom-nav-bg: #0a1a1a;
        --dom-accent: #0d9488;
        --dom-accent2: #34d399;
        --dom-bg: #051212;
        --dom-border: rgba(20, 184, 166, 0.22);
      }
      /* Grid visual */
      .grid-visual {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        margin: 4px 0;
      }
      .grid-row {
        display: flex;
        gap: 2px;
      }
      .grid-cell {
        width: 22px;
        height: 22px;
        background: rgba(20, 184, 166, 0.15);
        border: 1px solid rgba(20, 184, 166, 0.35);
        border-radius: 2px;
        font-size: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.3);
      }
      .grid-cell.edge {
        background: rgba(52, 211, 153, 0.3);
        border-color: #34d399;
      }
      .grid-legend {
        display: flex;
        gap: 14px;
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 600;
      }
      .legend-area {
        color: rgba(20, 184, 166, 0.8);
      }
      .legend-perim {
        color: #34d399;
      }
    </style>

  <body>
    <nav class="dom-nav">
      <a href="../../index.html#area-perimeter"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Area &amp; Perimeter</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">📐</div>
        <h1 class="start-title">Area &amp; Perimeter</h1>
        <p class="start-desc">
          Area = the space <em>inside</em> a shape. Perimeter = the distance <em>around</em> it. Tiles for the floor vs.
          fencing for a garden!
        </p>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>

        <!-- Interactive grid visual -->
        <div class="grid-visual" id="grid-visual" aria-hidden="true">
          <div class="grid-row" id="grid-row-0"></div>
          <div class="grid-row" id="grid-row-1"></div>
          <div class="grid-row" id="grid-row-2"></div>
          <div class="grid-row" id="grid-row-3"></div>
          <div class="grid-legend">
            <span class="legend-area">■ Area (inside)</span>
            <span class="legend-perim">■ Perimeter (edge)</span>
          </div>
        </div>

        <div class="q-emoji" id="q-emoji">📐</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Shape Master!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
