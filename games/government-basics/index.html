<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Government Basics - How the US Government Works for Kids | Doodles Games</title>
    <meta name="title" content="Government Basics - How the US Government Works" />
    <meta
      name="description"
      content="Learn how the US government works! Explore the three branches, the Constitution, rights and responsibilities, and democracy."
    />
    <meta name="keywords" content="us government kids, three branches, constitution, democracy, civics elementary" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/government-basics/" />
    <meta property="og:title" content="Government Basics - How the US Government Works" />
    <meta property="og:description" content="Learn about the three branches of government and democracy!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/government-basics/" />
    <meta property="twitter:title" content="Government Basics - How the US Government Works" />
    <meta property="twitter:description" content="Learn about the three branches of government and democracy!" />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/government-basics/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0b0d00;
        --dom-accent: #facc15;
        --dom-accent2: #fde047;
        --dom-bg: #060700;
        --dom-border: rgba(250, 204, 21, 0.22);
      }
      .branches-visual {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 6px 0 10px;
        flex-wrap: wrap;
      }
      .branch-pill {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
        border: 1.5px solid;
        text-align: center;
        line-height: 1.3;
      }
      .branch-leg {
        background: rgba(96, 165, 250, 0.1);
        border-color: #60a5fa;
        color: #93c5fd;
      }
      .branch-exec {
        background: rgba(250, 204, 21, 0.1);
        border-color: #facc15;
        color: #fde047;
      }
      .branch-jud {
        background: rgba(74, 222, 128, 0.1);
        border-color: #4ade80;
        color: #86efac;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#government-basics"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Government Basics</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🏛️</div>
        <h1 class="start-title">Government Basics</h1>
        <p class="start-desc">
          How does the US government work? Discover the three branches, the Constitution, and the rights every citizen
          has!
        </p>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="branches-visual" aria-hidden="true">
          <div class="branch-pill branch-leg">
            ⚖️ Legislative<br /><span style="font-weight: 400; font-size: 0.65rem">Makes laws</span>
          </div>
          <div class="branch-pill branch-exec">
            🦅 Executive<br /><span style="font-weight: 400; font-size: 0.65rem">Carries out laws</span>
          </div>
          <div class="branch-pill branch-jud">
            🏛️ Judicial<br /><span style="font-weight: 400; font-size: 0.65rem">Interprets laws</span>
          </div>
        </div>
        <div class="q-emoji" id="q-emoji">🏛️</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Civics Champion!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
