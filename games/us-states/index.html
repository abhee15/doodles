<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>US States and Capitals - Geography Game for Kids | Doodles Games</title>
    <meta name="title" content="US States & Capitals - Geography Game" />
    <meta
      name="description"
      content="Learn all 50 US states, their capitals, and locations with an interactive map. Fun geography game for kids!"
    />
    <meta name="keywords" content="US states, capitals, geography, map, kids, education, America" />

    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/us-states/" />
    <meta property="og:title" content="US States & Capitals - Geography Game" />
    <meta
      property="og:description"
      content="Learn all 50 US states, their capitals, and locations with an interactive map."
    />

    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/us-states/" />
    <meta property="twitter:title" content="US States & Capitals - Geography Game" />
    <meta
      property="twitter:description"
      content="Learn all 50 US states, their capitals, and locations with an interactive map."
    />

    <link rel="canonical" href="https://abhee15.github.io/doodles/games/us-states/" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />

    <style>
      :root {
        --dom-nav-bg: #1b3a4b;
        --dom-accent: #3d8b37;
        --dom-accent-dark: #2d6b27;
        --dom-accent2: #2196f3;
        --dom-bg: #0d2137;
        --dom-bg-card: rgba(255, 255, 255, 0.06);
        --dom-border: rgba(255, 255, 255, 0.12);
        --dom-text: #f0f0f0;
        --dom-text-muted: rgba(255, 255, 255, 0.55);
      }

      .mode-cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }
      .mode-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      .mode-card:hover {
        transform: translateY(-2px);
        border-color: var(--dom-accent);
      }
      .mode-card .icon {
        font-size: 36px;
        margin-bottom: 6px;
      }
      .mode-card h3 {
        color: var(--dom-text);
        font-size: 1.1rem;
        margin: 0 0 4px;
      }
      .mode-card p {
        color: var(--dom-text-muted);
        font-size: 0.875rem;
        margin: 0;
      }

      .map-container {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: 8px;
        position: relative;
        overflow: hidden;
      }
      .map-container svg {
        width: 100%;
        height: auto;
      }
      .map-container svg path {
        stroke: rgba(255, 255, 255, 0.3);
        stroke-width: 0.5;
        cursor: pointer;
        transition:
          fill 0.15s,
          stroke 0.15s;
      }
      .map-container svg path:hover {
        stroke: #fff;
        stroke-width: 1.5;
      }
      .map-container svg path.highlighted {
        stroke: var(--dom-accent);
        stroke-width: 2;
        filter: brightness(1.4);
      }
      .map-container svg path.correct {
        fill: #10b981 !important;
      }
      .map-container svg path.wrong {
        fill: #ef4444 !important;
      }

      .region-ne {
        fill: #6366f1;
      }
      .region-se {
        fill: #ec4899;
      }
      .region-mw {
        fill: #f59e0b;
      }
      .region-sw {
        fill: #ef4444;
      }
      .region-w {
        fill: #10b981;
      }

      .info-panel {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 16px 16px 0 0;
        padding: 16px 20px;
        margin: 0 8px;
      }
      .info-panel h3 {
        color: #fff;
        font-size: 1.3rem;
        margin: 0 0 4px;
      }
      .info-detail {
        color: var(--dom-text-muted);
        font-size: 0.9rem;
        margin: 2px 0;
      }
      .info-detail strong {
        color: var(--dom-text);
      }
      .info-fact {
        color: var(--dom-accent);
        font-size: 0.85rem;
        margin: 8px 0 0;
        font-style: italic;
      }

      .zoom-controls {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 5;
      }
      .zoom-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        color: #fff;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .question-text {
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff;
        text-align: center;
        padding: 12px 16px;
      }

      .options-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 8px 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      .option-btn {
        min-height: 48px;
        border-radius: 12px;
        background: var(--dom-bg-card);
        border: 2px solid var(--dom-border);
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.1s;
        padding: 8px;
      }
      .option-btn:active {
        transform: scale(0.96);
      }
      .option-btn.correct {
        border-color: #10b981;
        background: rgba(16, 185, 129, 0.15);
      }
      .option-btn.wrong {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.15);
      }

      .feedback {
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
        min-height: 28px;
        padding: 4px;
      }
      .feedback.correct {
        color: #10b981;
      }
      .feedback.wrong {
        color: #ef4444;
      }

      .progress-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin: 8px 20px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--dom-accent);
        border-radius: 3px;
        transition: width 0.3s;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      .stat-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat-card .value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--dom-accent);
      }
      .stat-card .label {
        font-size: 0.875rem;
        color: var(--dom-text-muted);
        margin-top: 4px;
      }

      .region-legend {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 8px;
        flex-wrap: wrap;
        font-size: 0.875rem;
        color: var(--dom-text-muted);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .stars {
        text-align: center;
        font-size: 2.5rem;
        margin: 12px 0;
      }
      .section-title {
        text-align: center;
        font-size: 1.1rem;
        color: var(--dom-text-muted);
        padding: 12px 16px 4px;
      }
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        flex-wrap: wrap;
      }

      @media (min-width: 500px) {
        .mode-cards {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
