<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Fractions - Parts of a Whole Math Game for Kids | Doodles Games</title>
    <meta name="title" content="Fractions - Parts of a Whole Math Game" />
    <meta
      name="description"
      content="Master fractions! Learn numerators, denominators, equivalent fractions, comparing, and adding fractions with visual fraction bars."
    />
    <meta
      name="keywords"
      content="fractions game kids, numerator denominator, equivalent fractions, fraction bar math"
    />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/fractions/" />
    <meta property="og:title" content="Fractions - Parts of a Whole Math Game" />
    <meta property="og:description" content="Master fractions with visual fraction bars and 15 questions!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/fractions/" />
    <meta property="twitter:title" content="Fractions - Parts of a Whole Math Game" />
    <meta property="twitter:description" content="Master fractions with visual fraction bars!" />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/fractions/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #100010;
        --dom-accent: #e879f9;
        --dom-accent2: #f0abfc;
        --dom-bg: #08000a;
        --dom-border: rgba(232, 121, 249, 0.22);
      }
      .frac-bar-wrap {
        margin: 6px auto 10px;
        max-width: 320px;
        width: 100%;
      }
      .frac-bar-label {
        font-size: 0.72rem;
        color: rgba(232, 121, 249, 0.6);
        text-align: center;
        margin-bottom: 4px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .frac-bar {
        display: flex;
        border-radius: 8px;
        overflow: hidden;
        height: 28px;
        border: 1.5px solid rgba(232, 121, 249, 0.3);
        width: 100%;
      }
      .frac-seg {
        flex: 1;
        border-right: 1px solid rgba(0, 0, 0, 0.3);
        transition: background 0.3s;
      }
      .frac-seg:last-child {
        border-right: none;
      }
      .frac-seg.filled {
        background: rgba(232, 121, 249, 0.55);
      }
      .frac-seg.empty {
        background: rgba(255, 255, 255, 0.05);
      }
      .frac-label {
        font-size: 1.2rem;
        font-weight: 800;
        text-align: center;
        color: #f0abfc;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#fractions"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Fractions</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🍕</div>
        <h1 class="start-title">Fractions</h1>
        <p class="start-desc">
          Pizza, pie, and parts! Learn what fractions mean, how to compare them, and how to add them — with a visual
          fraction bar!
        </p>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="frac-bar-wrap">
          <div class="frac-bar-label" id="frac-bar-label">Fraction Bar</div>
          <div class="frac-bar" id="frac-bar"></div>
          <div class="frac-label" id="frac-label"></div>
        </div>
        <div class="q-emoji" id="q-emoji">🍕</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Fraction Wizard!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
