    <style>
      :root {
        --dom-nav-bg: #92400e;
        --dom-accent: #f59e0b;
        --dom-accent-dark: #d97706;
        --dom-accent2: #b45309;
        --dom-bg: #1c1917;
        --dom-bg-card: rgba(255, 255, 255, 0.06);
        --dom-border: rgba(255, 255, 255, 0.12);
        --dom-text: #f0f0f0;
        --dom-text-muted: rgba(255, 255, 255, 0.55);
      }

      .grade-cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
        padding: 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      .grade-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 16px;
        padding: 24px 16px;
        text-align: center;
        cursor: pointer;
        transition:
          transform 0.2s,
          border-color 0.2s;
      }
      .grade-card:hover {
        transform: translateY(-2px);
        border-color: var(--dom-accent);
      }
      .grade-card .icon {
        font-size: 32px;
        margin-bottom: 6px;
      }
      .grade-card h3 {
        color: var(--dom-text);
        font-size: 1.1rem;
        margin: 0 0 4px;
      }
      .grade-card p {
        color: var(--dom-text-muted);
        font-size: 0.875rem;
        margin: 0;
      }

      .game-header {
        text-align: center;
        padding: 12px;
      }
      .word-counter {
        color: var(--dom-text-muted);
        font-size: 0.85rem;
      }
      .sentence {
        font-size: 1.1rem;
        color: var(--dom-text);
        text-align: center;
        padding: 8px 20px;
        line-height: 1.6;
        min-height: 52px;
      }
      .sentence .blank {
        border-bottom: 2px dashed var(--dom-accent);
        padding: 0 12px;
      }

      .answer-area {
        display: flex;
        justify-content: center;
        gap: 4px;
        padding: 12px 16px;
        min-height: 56px;
        flex-wrap: wrap;
      }
      .answer-slot {
        width: 36px;
        height: 44px;
        border: 2px dashed var(--dom-border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        transition: border-color 0.15s;
      }
      .answer-slot.filled {
        border-style: solid;
        border-color: var(--dom-accent);
        background: rgba(245, 158, 11, 0.15);
      }
      .answer-slot.correct {
        border-color: #10b981;
        background: rgba(16, 185, 129, 0.15);
      }
      .answer-slot.wrong {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.15);
      }

      .tile-area {
        display: flex;
        justify-content: center;
        gap: 6px;
        padding: 12px 16px;
        flex-wrap: wrap;
      }
      .letter-tile {
        width: 44px;
        height: 48px;
        border: 2px solid var(--dom-accent);
        border-radius: 10px;
        background: rgba(245, 158, 11, 0.1);
        color: #fff;
        font-size: 1.3rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.1s,
          opacity 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
      }
      .letter-tile:active {
        transform: scale(0.9);
      }
      .letter-tile.used {
        opacity: 0.25;
        pointer-events: none;
      }

      .hint-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        padding: 8px 16px;
      }
      .hint-btn {
        min-height: 44px;
        padding: 8px 14px;
        border-radius: 10px;
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        color: var(--dom-text);
        font-size: 0.875rem;
        cursor: pointer;
        transition: border-color 0.15s;
      }
      .hint-btn:hover {
        border-color: var(--dom-accent);
      }
      .hint-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .feedback {
        text-align: center;
        font-size: 1.1rem;
        font-weight: 700;
        min-height: 30px;
        padding: 4px;
      }
      .feedback.correct {
        color: #10b981;
      }
      .feedback.wrong {
        color: #ef4444;
      }

      .progress-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        margin: 4px 20px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--dom-accent);
        border-radius: 3px;
        transition: width 0.3s;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 20px;
        max-width: 400px;
        margin: 0 auto;
      }
      .stat-card {
        background: var(--dom-bg-card);
        border: 1px solid var(--dom-border);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }
      .stat-card .value {
        font-size: 2rem;
        font-weight: 800;
        color: var(--dom-accent);
      }
      .stat-card .label {
        font-size: 0.875rem;
        color: var(--dom-text-muted);
        margin-top: 4px;
      }

      .stars {
        text-align: center;
        font-size: 2.5rem;
        margin: 12px 0;
      }
      .section-title {
        text-align: center;
        font-size: 1.1rem;
        color: var(--dom-text-muted);
        padding: 12px 16px 4px;
      }
      .btn-row {
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 16px;
        flex-wrap: wrap;
      }
    </style>
  </head>
