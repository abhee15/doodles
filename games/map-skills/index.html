<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Map Skills - Compass, Directions & Geography for Kids | Doodles Games</title>
    <meta name="title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta
      name="description"
      content="Master compass directions, map keys, scales, latitude and longitude! Fun geography skills quiz."
    />
    <meta
      name="keywords"
      content="map skills, compass directions, north south east west, latitude longitude, geography"
    />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/map-skills/" />
    <meta property="og:title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta property="og:description" content="Master compass directions, map keys, scales, latitude and longitude!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/map-skills/" />
    <meta property="twitter:title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta
      property="twitter:description"
      content="Master compass directions, map keys, scales, latitude and longitude!"
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/map-skills/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #010c1a;
        --dom-accent: #0ea5e9;
        --dom-accent2: #22c55e;
        --dom-bg: #020d1f;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .map-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .map-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
      .compass-demo {
        font-size: 2.5rem;
        text-align: center;
        margin: 10px 0;
        letter-spacing: 12px;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#map-skills"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Map Skills</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🧭</div>
        <h1 class="start-title">Map Skills</h1>
        <p class="start-desc">Navigate like an explorer! Learn compass directions, map keys, and geography tools.</p>
        <div class="compass-demo">⬆️⬇️⬅️➡️</div>
        <div class="map-chips">
          <span class="map-chip">🧭 N, S, E, W</span>
          <span class="map-chip">🗝️ Map Key</span>
          <span class="map-chip">📏 Scale</span>
          <span class="map-chip">🌐 Latitude</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">🧭</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Master Navigator!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
