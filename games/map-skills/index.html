<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Map Skills - Compass, Directions & Geography for Kids | Doodles Games</title>
    <meta name="title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta
      name="description"
      content="Master compass directions, map keys, scales, latitude and longitude! Fun geography skills quiz."
    />
    <meta
      name="keywords"
      content="map skills, compass directions, north south east west, latitude longitude, geography"
    />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/map-skills/" />
    <meta property="og:title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta property="og:description" content="Master compass directions, map keys, scales, latitude and longitude!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/map-skills/" />
    <meta property="twitter:title" content="Map Skills - Compass and Directions Quiz for Kids" />
    <meta
      property="twitter:description"
      content="Master compass directions, map keys, scales, latitude and longitude!"
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/map-skills/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #010c1a;
        --dom-accent: #0ea5e9;
        --dom-accent2: #22c55e;
        --dom-bg: #020d1f;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .map-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .map-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
      .compass-demo {
        font-size: 2.5rem;
        text-align: center;
        margin: 10px 0;
        letter-spacing: 12px;
      }
      .compass-rose-game {
        width: 96px;
        height: 96px;
        margin: 0 auto 4px;
        display: block;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#map-skills"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Map Skills</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🧭</div>
        <h1 class="start-title">Map Skills</h1>
        <p class="start-desc">Navigate like an explorer! Learn compass directions, map keys, and geography tools.</p>
        <div class="compass-demo">⬆️⬇️⬅️➡️</div>
        <div class="map-chips">
          <span class="map-chip">🧭 N, S, E, W</span>
          <span class="map-chip">🗝️ Map Key</span>
          <span class="map-chip">📏 Scale</span>
          <span class="map-chip">🌐 Latitude</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <svg
          class="compass-rose-game"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="Compass rose"
        >
          <circle
            cx="50"
            cy="50"
            r="46"
            fill="rgba(14,165,233,0.06)"
            stroke="rgba(14,165,233,0.28)"
            stroke-width="1.5"
          />
          <line x1="50" y1="6" x2="50" y2="94" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
          <line x1="6" y1="50" x2="94" y2="50" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
          <line x1="18" y1="18" x2="82" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
          <line x1="82" y1="18" x2="18" y2="82" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
          <polygon points="50,10 46,38 50,32 54,38" fill="#ef4444" />
          <polygon points="50,90 46,62 50,68 54,62" fill="rgba(255,255,255,0.55)" />
          <polygon points="90,50 62,46 68,50 62,54" fill="rgba(255,255,255,0.55)" />
          <polygon points="10,50 38,46 32,50 38,54" fill="rgba(255,255,255,0.55)" />
          <circle cx="50" cy="50" r="4" fill="#0ea5e9" />
          <circle cx="50" cy="50" r="2" fill="white" />
          <text x="50" y="7" text-anchor="middle" font-size="9" font-weight="bold" fill="#ef4444">N</text>
          <text x="50" y="98" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.65)">S</text>
          <text x="97" y="53" text-anchor="end" font-size="9" fill="rgba(255,255,255,0.65)">E</text>
          <text x="3" y="53" text-anchor="start" font-size="9" fill="rgba(255,255,255,0.65)">W</text>
          <text x="81" y="21" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.35)">NE</text>
          <text x="19" y="21" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.35)">NW</text>
          <text x="81" y="84" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.35)">SE</text>
          <text x="19" y="84" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.35)">SW</text>
        </svg>
        <div class="q-emoji" id="q-emoji">🧭</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Master Navigator!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
