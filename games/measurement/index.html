      name="description"
      content="Master units of measurement! Learn cm, m, g, kg, seconds, minutes, and hours with fun quiz questions."
    />

    <meta property="og:url" content="https://abhee15.github.io/doodles/games/measurement/" />
    <meta property="og:title" content="Measurement - Units Quiz for Kids" />
    <meta property="og:description" content="Master units of measurement — cm, m, g, kg, seconds, minutes, hours!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/measurement/" />
    <meta property="twitter:title" content="Measurement - Units Quiz for Kids" />
    <meta
      property="twitter:description"
      content="Master units of measurement — cm, m, g, kg, seconds, minutes, hours!"
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/measurement/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0a0020;
        --dom-accent: #7c3aed;
        --dom-accent2: #06b6d4;
        --dom-bg: #0d0124;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .unit-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .unit-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#measurement"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Measurement</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">📏</div>
        <h1 class="start-title">Measurement</h1>
        <p class="start-desc">Master the units scientists and engineers use — length, weight, and time conversions!</p>
        <div class="unit-chips">
          <span class="unit-chip">📏 cm & m</span>
          <span class="unit-chip">⚖️ g & kg</span>
          <span class="unit-chip">⏱️ sec & min</span>
          <span class="unit-chip">🕐 hours & days</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">📏</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Measurement Master!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
