<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Capital Cities - World Capitals Geography Game for Kids | Doodles Games</title>
    <meta name="title" content="Capital Cities - World Capitals Geography Game" />
    <meta
      name="description"
      content="Match countries to their capital cities! Geography game covering Easy, Medium, and Hard levels. Great for kids ages 8–12."
    />
    <meta
      name="keywords"
      content="capital cities game kids, world capitals geography, country capital quiz, geography learning children"
    />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/capital-cities/" />
    <meta property="og:title" content="Capital Cities - World Capitals Geography Game" />
    <meta property="og:description" content="Match countries to their capitals! Three levels from easy to hard." />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/capital-cities/" />
    <meta property="twitter:title" content="Capital Cities - World Capitals Geography Game" />
    <meta property="twitter:description" content="Match countries to their capitals! Three levels from easy to hard." />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/capital-cities/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0d1f0a;
        --dom-nav-color: #bbf7d0;
        --dom-nav-border: rgba(34, 197, 94, 0.3);
        --dom-accent: #15803d;
        --dom-accent2: #f59e0b;
        --dom-bg: #060f04;
        --dom-text: #f0fdf4;
        --dom-text-muted: rgba(240, 253, 244, 0.6);
        --dom-border: rgba(34, 197, 94, 0.22);
        --dom-card-bg: rgba(255, 255, 255, 0.04);
      }
      body {
        background: var(--dom-bg);
        color: var(--dom-text);
        overflow-x: hidden;
      }
      .screen {
        display: none;
        padding: 16px;
        min-height: calc(100vh - var(--dom-nav-height));
        align-items: center;
        justify-content: flex-start;
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
      .screen.active {
        display: flex;
      }
      .start-title {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1.2;
        margin-top: 8px;
      }
      .start-sub {
        font-size: 1rem;
        color: var(--dom-text-muted);
        max-width: 300px;
        line-height: 1.5;
      }
      .level-picker {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
        max-width: 380px;
      }
      .level-btn {
        flex: 1;
        min-width: 90px;
        padding: 18px 10px;
        border-radius: 14px;
        border: 2px solid var(--dom-border);
        background: var(--dom-card-bg);
        color: var(--dom-text);
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        transition:
          border-color 0.15s,
          transform 0.12s;
      }
      .level-btn:hover {
        border-color: var(--dom-accent);
        transform: translateY(-2px);
      }
      .lv-emoji {
        font-size: 2rem;
      }
      .lv-label {
        font-size: 1rem;
        font-weight: 800;
      }
      .game-meta {
        display: flex;
        width: 100%;
        max-width: 440px;
        justify-content: space-between;
        font-size: 0.875rem;
        font-weight: 700;
        color: var(--dom-text-muted);
      }
      .country-card {
        background: var(--dom-card-bg);
        border: 2px solid var(--dom-border);
        border-radius: 20px;
        padding: 28px 24px;
        width: 100%;
        max-width: 440px;
      }
      .country-prompt {
        font-size: 0.875rem;
        color: var(--dom-text-muted);
        font-weight: 600;
        margin-bottom: 10px;
      }
      .country-display {
        font-size: 2rem;
        font-weight: 800;
        color: var(--dom-accent2);
      }
      .choices-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        max-width: 440px;
      }
      .choice-btn {
        width: 100%;
        padding: 14px 20px;
        border-radius: 12px;
        border: 2px solid var(--dom-border);
        background: var(--dom-card-bg);
        color: var(--dom-text);
        font-size: 1rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        min-height: 44px;
        transition:
          border-color 0.12s,
          transform 0.1s;
      }
      .choice-btn:hover:not(:disabled) {
        border-color: var(--dom-accent);
        transform: translateY(-1px);
      }
      .choice-btn:disabled {
        cursor: default;
      }
      .choice-btn.correct-choice {
        border-color: #4ade80;
        color: #4ade80;
        background: rgba(74, 222, 128, 0.08);
      }
      .choice-btn.wrong-choice {
        border-color: #f87171;
        color: #f87171;
        background: rgba(248, 113, 113, 0.08);
      }
      .feedback {
        font-size: 0.875rem;
        font-weight: 700;
        min-height: 1.5rem;
        text-align: center;
        max-width: 380px;
      }
      .feedback.good {
        color: #4ade80;
      }
      .feedback.bad {
        color: #f87171;
      }
      .action-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .action-btn {
        padding: 12px 24px;
        border-radius: 10px;
        border: 2px solid var(--dom-border);
        background: var(--dom-card-bg);
        color: var(--dom-text);
        font-size: 1rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        min-height: 44px;
        transition:
          border-color 0.15s,
          transform 0.12s;
      }
      .action-btn:hover {
        border-color: var(--dom-accent);
        transform: translateY(-2px);
      }
      .result-emoji {
        font-size: 4rem;
      }
      .result-title {
        font-size: 1.8rem;
        font-weight: 800;
      }
      .result-score {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--dom-accent2);
      }
      .result-level {
        font-size: 1rem;
        color: var(--dom-text-muted);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#capital-cities"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title">Capital Cities</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>
    <div class="screen active" id="screen-start">
      <div class="start-title">
        <span style="display: block; font-size: 2.8rem; margin-bottom: 8px">🌍</span>Capital Cities
      </div>
      <div class="start-sub">What is the capital city? Pick your level and test your geography!</div>
      <div class="level-picker" id="level-picker"></div>
    </div>
    <div class="screen" id="screen-game">
      <div class="game-meta"><span id="round-label">Round 1 of 10</span><span id="score-label">Score: 0</span></div>
      <div class="country-card">
        <div class="country-prompt">What is the capital of...</div>
        <div class="country-display" id="country-display">France</div>
      </div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="feedback" id="feedback"></div>
      <div class="action-row"><button class="action-btn" id="btn-menu">← Menu</button></div>
    </div>
    <div class="screen" id="screen-result">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <div class="result-title" id="result-title">Geography Expert!</div>
      <div class="result-score" id="result-score">10 / 10 correct</div>
      <div class="result-level" id="result-level">Easy level</div>
      <div class="action-row" style="margin-top: 12px">
        <button class="action-btn" id="btn-menu">Change Level</button>
        <button class="action-btn" id="btn-play-again">Play Again</button>
      </div>
    </div>
    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
