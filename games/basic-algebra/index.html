    />

    <meta name="title" content="Basic Algebra - Solve for X Quiz for Kids" />
    <meta
      name="description"
      content="Intro to algebra! Solve simple equations with variables. Find what x equals — fun and step-by-step!"
    />
    <meta name="keywords" content="algebra, variables, equations, solve for x, math for kids, 5th grade 6th grade" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/basic-algebra/" />
    <meta property="og:title" content="Basic Algebra - Solve for X Quiz for Kids" />
    <meta property="og:description" content="Intro to algebra! Solve simple equations with variables." />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/basic-algebra/" />
    <meta property="twitter:title" content="Basic Algebra - Solve for X Quiz for Kids" />
    <meta property="twitter:description" content="Intro to algebra! Solve simple equations with variables." />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/basic-algebra/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #001a10;
        --dom-accent: #059669;
        --dom-accent2: #0891b2;
        --dom-text: rgba(255, 255, 255, 0.95);
        --dom-text-muted: rgba(255, 255, 255, 0.62);
        --dom-bg: #00170e;
        --dom-border: rgba(255, 255, 255, 0.1);
      }
      .alg-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .alg-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
      .eq-demo {
        font-size: 1.8rem;
        text-align: center;
        margin: 8px 0;
        color: #34d399;
        font-weight: 700;
        letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#basic-algebra"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Basic Algebra</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🔢</div>
        <h1 class="start-title">Basic Algebra</h1>
        <p class="start-desc">
          Solve equations by finding the mystery number! The first step into the world of algebra.
        </p>
        <div class="eq-demo">x + 3 = 7 → x = ?</div>
        <div class="alg-chips">
          <span class="alg-chip">➕ Addition</span>
          <span class="alg-chip">➖ Subtraction</span>
          <span class="alg-chip">✖️ Multiplication</span>
          <span class="alg-chip">❓ Variables</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">🔢</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Algebra Star!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
