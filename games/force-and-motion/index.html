<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Force & Motion - Push Pull Friction Game for Kids | Doodles Games</title>
    <meta name="title" content="Force & Motion - Push, Pull & Friction Game" />
    <meta
      name="description"
      content="Explore forces! Learn about push, pull, friction, gravity, and how forces change motion. Perfect for K-5 science."
    />
    <meta name="keywords" content="force motion game kids, push pull friction gravity, science physics elementary" />
    <meta property="og:type" content="game" />
    <meta property="og:url" content="https://abhee15.github.io/doodles/games/force-and-motion/" />
    <meta property="og:title" content="Force & Motion - Push, Pull & Friction Game" />
    <meta property="og:description" content="Explore forces, friction, and gravity in this science quiz!" />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/force-and-motion/" />
    <meta property="twitter:title" content="Force & Motion - Push, Pull & Friction Game" />
    <meta property="twitter:description" content="Explore forces, friction, and gravity in this science quiz!" />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/force-and-motion/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #0e0800;
        --dom-accent: #fb923c;
        --dom-accent2: #fdba74;
        --dom-text: rgba(255, 255, 255, 0.95);
        --dom-text-muted: rgba(255, 255, 255, 0.62);
        --dom-bg: #0a0500;
        --dom-border: rgba(251, 146, 60, 0.22);
      }
      .force-visual {
        width: 100%;
        max-width: 320px;
        margin: 4px auto 10px;
        display: block;
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#force-and-motion"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Force &amp; Motion</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🚀</div>
        <h1 class="start-title">Force &amp; Motion</h1>
        <p class="start-desc">
          Push it, pull it, slide it, drop it! Discover how forces make things move, slow down, or stop.
        </p>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <!-- Force diagram SVG — always visible as context -->
        <svg class="force-visual" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect
            x="110"
            y="20"
            width="100"
            height="40"
            rx="8"
            fill="rgba(251,146,60,0.12)"
            stroke="rgba(251,146,60,0.35)"
            stroke-width="1.5"
          />
          <text
            x="160"
            y="45"
            text-anchor="middle"
            fill="rgba(255,255,255,0.7)"
            font-size="13"
            font-family="sans-serif"
          >
            📦 Object
          </text>
          <!-- Push arrow left -->
          <line x1="60" y1="40" x2="105" y2="40" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round" />
          <polygon points="108,40 100,35 100,45" fill="#fb923c" />
          <text x="42" y="36" fill="#fb923c" font-size="10" font-family="sans-serif" text-anchor="middle">PUSH</text>
          <!-- Pull arrow right -->
          <line x1="215" y1="40" x2="265" y2="40" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" />
          <polygon points="268,40 260,35 260,45" fill="#60a5fa" />
          <text x="278" y="36" fill="#60a5fa" font-size="10" font-family="sans-serif" text-anchor="middle">PULL</text>
          <!-- Gravity arrow down -->
          <line x1="160" y1="62" x2="160" y2="75" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" />
          <polygon points="160,78 155,70 165,70" fill="#a78bfa" />
          <text x="160" y="76" fill="rgba(0,0,0,0)" font-size="1">g</text>
          <text x="185" y="76" fill="#a78bfa" font-size="9" font-family="sans-serif">gravity ↓</text>
        </svg>
        <div class="q-emoji" id="q-emoji">🚀</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">Force Expert!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
