      name="description"
      content="Travel back in time! Learn about ancient Egypt, Greece, Rome, China, and Maya civilizations."
    />
    <meta name="keywords" content="ancient civilizations, Egypt, Rome, Greece, Maya, China, history for kids" />
    <meta property="og:type" content="game" />

      property="og:description"
      content="Travel back in time! Learn about ancient Egypt, Greece, Rome, China, and Maya."
    />
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://abhee15.github.io/doodles/games/ancient-civ/" />
    <meta property="twitter:title" content="Ancient Civilizations - History Quiz for Kids" />
    <meta
      property="twitter:description"
      content="Travel back in time! Learn about ancient Egypt, Greece, Rome, China, and Maya."
    />
    <link rel="canonical" href="https://abhee15.github.io/doodles/games/ancient-civ/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="../../shared/tokens.css" />
    <link rel="stylesheet" href="../../shared/game-dom.css" />
    <style>
      :root {
        --dom-nav-bg: #1a0a00;
        --dom-accent: #d97706;
        --dom-accent2: #dc2626;
        --dom-bg: #130700;
        --dom-border: rgba(255, 255, 255, 0.1);
        --dom-text: rgba(255, 255, 255, 0.95);
        --dom-text-muted: rgba(255, 255, 255, 0.62);
      }
      .civ-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin: 18px 0;
      }
      .civ-chip {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--dom-border);
        border-radius: 20px;
        padding: 8px 16px;
        font-size: 0.85rem;
        color: var(--tok-white);
      }
    </style>
  </head>
  <body>
    <nav class="dom-nav">
      <a href="../../index.html#ancient-civ"><i class="ti ti-arrow-left"></i> Back</a>
      <span class="dom-nav-title" id="nav-title">Ancient Civilizations</span>
      <span class="dom-nav-meta" id="nav-meta"></span>
    </nav>

    <div class="screen active" id="screen-start">
      <div class="start-card">
        <div class="start-emoji">🏛️</div>
        <h1 class="start-title">Ancient Civilizations</h1>
        <p class="start-desc">
          Travel thousands of years back in time! Explore the greatest civilizations of the ancient world.
        </p>
        <div class="civ-chips">
          <span class="civ-chip">🏺 Egypt</span>
          <span class="civ-chip">🏟️ Rome</span>
          <span class="civ-chip">⚡ Greece</span>
          <span class="civ-chip">🌿 Maya</span>
          <span class="civ-chip">🐉 China</span>
        </div>
        <button class="dom-btn dom-btn--primary" id="btn-start">Start Quiz</button>
      </div>
    </div>

    <div class="screen" id="screen-game">
      <div class="game-card">
        <div class="game-hud">
          <span id="round-label">Round 1 of 10</span>
          <span id="score-label">Score: 0</span>
        </div>
        <div class="q-emoji" id="q-emoji">🏛️</div>
        <div class="q-text" id="q-text"></div>
        <div id="choices-grid" class="choices-grid"></div>
        <div class="feedback" id="feedback"></div>
        <div class="fact-box" id="fact-box" style="display: none"></div>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="result-card">
        <div class="result-emoji" id="result-emoji">🏆</div>
        <div class="result-title" id="result-title">History Legend!</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-actions">
          <button class="dom-btn dom-btn--primary" id="btn-play-again">Play Again</button>
          <button class="dom-btn dom-btn--ghost" id="btn-menu">Main Menu</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
    <script src="../../shared/error-tracker.js"></script>
    <script src="../../shared/analytics.js"></script>
    <div id="ad-container"></div>
    <script src="../../shared/ads.js"></script>
  </body>
</html>
